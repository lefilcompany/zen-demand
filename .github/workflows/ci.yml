name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: ESLint
        run: bun run lint
      - name: TypeScript
        run: bunx tsc --noEmit

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run Vitest
        run: bunx vitest run --reporter=default

  edge-functions:
    name: Edge Function tests (Deno)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with: { deno-version: v1.x }
      - name: Run Deno tests
        run: deno test --allow-net --allow-env --allow-read supabase/functions/process-recurring-demands/

  e2e:
    name: E2E ${{ matrix.spec }}
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        spec:
          - boards
          - demands
          - members
          - services
    env:
      E2E_SEED_SECRET: ${{ secrets.E2E_SEED_SECRET }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      E2E_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tests_selenium/requirements.txt
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests_selenium/requirements.txt
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Write .env for Vite
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY"
            echo "VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID"
          } > .env

      - name: Start dev server
        run: |
          nohup bun run dev > /tmp/dev.log 2>&1 &
          echo "Aguardando dev server..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080 > /dev/null && echo "✓ pronto" && exit 0
            sleep 2
          done
          echo "✗ dev server não subiu"; tail -200 /tmp/dev.log; exit 1

      - name: Run Selenium (${{ matrix.spec }})
        run: |
          python -m pytest tests_selenium/tests/test_plan_limits_${{ matrix.spec }}.py \
            --junitxml=reports/junit-${{ matrix.spec }}.xml

      - name: Dump dev server log on failure
        if: failure()
        run: tail -300 /tmp/dev.log || true

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-${{ matrix.spec }}
          path: reports/
          retention-days: 14
